<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dsound-System | Single</title>
  <meta name="description" content="Escucha un single de Dsound-System con su propia pagina, letra y enlaces para compartir.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="song">
  <div class="page-shell">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <header class="site-header">
      <a class="brand" href="index.html" id="brand-link">Dsound-System</a>
      <nav class="site-nav" aria-label="Principal">
        <a href="index.html#inicio">Inicio</a>
        <a href="index.html#musica">Musica</a>
        <div class="songs-menu" id="songs-menu">
          <button
            class="button button-secondary menu-toggle"
            id="songs-menu-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="songs-menu-list"
          >
            Canciones
          </button>
          <div class="songs-menu-panel" id="songs-menu-list" hidden></div>
        </div>
      </nav>
    </header>

    <main>
      <section class="section music-focus song-focus" id="cancion">
        <div class="songs-grid song-detail-grid" id="songs-grid"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>

</html>
